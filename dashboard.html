<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard Admin</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Segoe UI,sans-serif;
}

body{
    background:#f5f5f5;
}

.header{
    background:linear-gradient(90deg,#2e7d32,#fbc02d);
    color:white;
    padding:20px;
    text-align:center;
}

.logo{
    width:80px;
    margin-bottom:10px;
}

.container{
    width:90%;
    max-width:1100px;
    margin:30px auto;
}

.welcome{
    background:white;
    padding:20px;
    border-radius:15px;
    box-shadow:0 3px 10px rgba(0,0,0,.1);
    margin-bottom:30px;
}

.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:20px;
}

.card{
    background:white;
    border-radius:15px;
    padding:30px;
    text-align:center;
    cursor:pointer;
    transition:.3s;
    box-shadow:0 3px 10px rgba(0,0,0,.1);
}

.card:hover{
    transform:translateY(-5px);
    background:#f1f8e9;
}

.icon{
    font-size:50px;
    margin-bottom:15px;
}

.logout{
    margin-top:40px;
    text-align:center;
}

button{
    background:#d32f2f;
    color:white;
    border:none;
    padding:12px 30px;
    border-radius:10px;
    cursor:pointer;
}
</style>
</head>
<body>

<div class="header">
    <img src="assets/logo.png" class="logo">
    <h1>Dashboard Admin</h1>
</div>

<div class="container">

    <div class="welcome">
        <h2 id="namaAdmin"></h2>
        <p>Sistem Informasi Absensi SMANECIS</p>
    </div>

    <div class="grid">

        <div class="card" onclick="location.href='kelas.html'">
            <div class="icon">🏫</div>
            <h3>Data Kelas</h3>
        </div>

        <div class="card" onclick="location.href='siswa.html'">
            <div class="icon">👨‍🎓</div>
            <h3>Data Siswa</h3>
        </div>

        <div class="card" onclick="location.href='users.html'">
            <div class="icon">👥</div>
            <h3>Kelola User</h3>
        </div>

        <div class="card" onclick="location.href='absensi.html'">
            <div class="icon">📝</div>
            <h3>Absensi</h3>
        </div>

        <div class="card" onclick="location.href='laporan.html'">
            <div class="icon">📊</div>
            <h3>Laporan</h3>
        </div>

    </div>

    <div class="logout">
        <button onclick="logout()">
            Logout
        </button>
    </div>

</div>

<script src="js/dashboard.js"></script>

</body>
</html>
