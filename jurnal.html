<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1">

<title>Jurnal Kelas</title>

<style>
body{
    margin:0;
    font-family:Segoe UI;
    background:#f5f5f5;
}

.header{
    background:linear-gradient(
        90deg,
        #2e7d32,
        #fbc02d
    );
    color:white;
    padding:20px;
}

.container{
    width:95%;
    max-width:700px;
    margin:auto;
    margin-top:20px;
}

.card{
    background:white;
    padding:25px;
    border-radius:20px;
    box-shadow:0 3px 10px rgba(0,0,0,.1);
}

input,
select,
textarea{
    width:100%;
    padding:12px;
    margin-top:5px;
    margin-bottom:15px;
    border:1px solid #ddd;
    border-radius:10px;
    box-sizing:border-box;
}

button{
    width:100%;
    padding:15px;
    border:none;
    border-radius:12px;
    background:#2e7d32;
    color:white;
    font-size:16px;
    cursor:pointer;
}

table{
    width:100%;
    margin-top:20px;
    border-collapse:collapse;
    background:white;
}

th{
    background:#fbc02d;
    color:white;
    padding:10px;
}

td{
    padding:10px;
    border-bottom:1px solid #eee;
}
</style>
</head>
<body>

<div class="header">
    <h2>📚 Jurnal Kelas</h2>
    <p id="kelasPetugas"></p>
</div>

<div class="container">

<div class="card">

<label>Jam Ke</label>
<input type="number" id="jamKe">

<label>Mata Pelajaran</label>
<input type="text" id="mapel">

<label>Guru</label>
<input type="text" id="guru">

<label>Jenis KBM</label>
<select id="jenis">
    <option>Efektif</option>
    <option>Tugas</option>
    <option>Jamkos</option>
</select>

<label>Materi</label>
<textarea id="materi"
rows="4"></textarea>

<button onclick="simpanJurnal()">
💾 Simpan Jurnal
</button>

</div>

<h3>Jurnal Hari Ini</h3>

<table>
<thead>
<tr>
<th>Jam</th>
<th>Mapel</th>
<th>Guru</th>
<th>Jenis</th>
</tr>
</thead>

<tbody id="dataJurnal">

</tbody>
</table>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabase.js"></script>
<script src="js/jurnal.js"></script>

</body>
</html>
