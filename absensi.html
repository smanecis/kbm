<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1">

<title>Absensi Hari Ini</title>

<style>
body{
    margin:0;
    font-family:Segoe UI;
    background:#f5f5f5;
}

.header{
    background:linear-gradient(
        90deg,
        #2e7d32,
        #fbc02d
    );
    color:white;
    padding:20px;
}

.container{
    width:95%;
    max-width:900px;
    margin:auto;
    margin-top:20px;
}

.info{
    background:white;
    padding:20px;
    border-radius:20px;
    margin-bottom:20px;
    box-shadow:0 3px 10px rgba(0,0,0,.1);
}

.progress{
    font-size:18px;
    color:#2e7d32;
    font-weight:bold;
}

.siswa-card{
    background:white;
    border-radius:20px;
    padding:20px;
    margin-bottom:15px;
    box-shadow:0 3px 10px rgba(0,0,0,.1);
}

.nama{
    font-size:18px;
    font-weight:bold;
    margin-bottom:15px;
}

.status{
    display:flex;
    flex-wrap:wrap;
    gap:10px;
}

.btnStatus{
    border:none;
    border-radius:12px;
    padding:10px 15px;
    cursor:pointer;
    color:white;
    font-weight:bold;
}

.hadir{
    background:#2e7d32;
}

.izin{
    background:#fbc02d;
}

.sakit{
    background:#1976d2;
}

.alpha{
    background:#d32f2f;
}

.selected{
    transform:scale(1.08);
    box-shadow:0 0 10px #999;
}

.footer{
    text-align:center;
    margin-top:30px;
    margin-bottom:30px;
}

.simpan{
    background:#2e7d32;
    color:white;
    border:none;
    padding:15px 30px;
    border-radius:15px;
    font-size:16px;
    cursor:pointer;
}

    .statusAktif{
    margin-bottom:15px;
    font-size:15px;
    font-weight:bold;
}

.statusAktif span{
    font-size:18px;
}

.btnStatus{
    border:none;
    border-radius:12px;
    padding:12px 16px;
    cursor:pointer;
    color:white;
    font-weight:bold;
    opacity:.45;
    transition:all .2s;
}

.btnStatus.selected{
    opacity:1;
    transform:scale(1.08);
    box-shadow:0 5px 15px rgba(0,0,0,.25);
}

.status-hadir{
    color:#2e7d32;
}

.status-izin{
    color:#fbc02d;
}

.status-sakit{
    color:#1976d2;
}

.status-alpha{
    color:#d32f2f;
}
    
</style>
</head>
<body>

<div class="header">
    <h2>📝 Absensi Hari Ini</h2>
</div>

<div class="container">

<div class="info">
    <h3 id="namaKelas"></h3>
    <p id="tanggal"></p>

    <br>

    <div class="progress">
        Progress:
        <span id="progress">
            0 / 0
        </span>
    </div>
</div>

<div id="daftarSiswa">

</div>

<div class="footer">
<button
class="simpan"
onclick="simpanAbsensi()">
💾 Simpan Absensi
</button>
</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabase.js"></script>
<script src="js/absensi.js"></script>

</body>
</html>
