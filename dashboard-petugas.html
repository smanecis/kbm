<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard Petugas</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    min-height:100vh;
    background:linear-gradient(135deg,#2e7d32,#fbc02d);
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
}

.card{
    width:100%;
    max-width:500px;
    background:white;
    border-radius:25px;
    padding:35px;
    box-shadow:0 15px 40px rgba(0,0,0,.2);
    text-align:center;
}

.logo{
    width:90px;
    margin-bottom:15px;
}

.judul{
    color:#2e7d32;
    margin-bottom:5px;
}

.subjudul{
    color:#777;
    margin-bottom:30px;
}

.user{
    background:#f1f8e9;
    padding:20px;
    border-radius:15px;
    margin-bottom:20px;
}

.user h2{
    color:#2e7d32;
}

.user p{
    color:#555;
    margin-top:8px;
}

.info{
    display:grid;
    grid-template-columns:1fr;
    gap:15px;
    margin-bottom:30px;
}

.box{
    background:#fafafa;
    padding:18px;
    border-radius:15px;
    border-left:6px solid #fbc02d;
    text-align:left;
}

.box h3{
    color:#666;
    font-size:15px;
    margin-bottom:5px;
}

.box span{
    font-size:20px;
    font-weight:bold;
    color:#2e7d32;
}

.btn{
    width:100%;
    padding:15px;
    border:none;
    border-radius:12px;
    font-size:16px;
    font-weight:bold;
    cursor:pointer;
    margin-top:12px;
}

.btnAbsen{
    background:#2e7d32;
    color:white;
}

.btnLogout{
    background:#d32f2f;
    color:white;
}

.btn:hover{
    opacity:0.9;
}
</style>
</head>
<body>

<div class="card">

    <img
        src="assets/logo.png"
        class="logo"
        alt="Logo Sekolah">

    <h1 class="judul">
        Aplikasi Absensi Siswa
    </h1>

    <p class="subjudul">
        SMANECIS
    </p>

    <div class="user">
        <h2 id="namaPetugas"></h2>
        <p id="kelasPetugas"></p>
    </div>

    <div class="info">

        <div class="box">
            <h3>📅 Tanggal Hari Ini</h3>
            <span id="tanggal"></span>
        </div>

        <div class="box">
            <h3>👨‍🎓 Jumlah Siswa</h3>
            <span id="jumlahSiswa">0</span>
        </div>

        <div class="box">
            <h3>✅ Sudah Absen</h3>
            <span id="jumlahAbsen">0</span>
        </div>

    </div>

    <button
        class="btn btnAbsen"
        onclick="location.href='absensi.html'">
        📝 MULAI ABSENSI
    </button>

    <button
        class="btn btnLogout"
        onclick="logout()">
        🚪 LOGOUT
    </button>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabase.js"></script>
<script src="js/dashboard-petugas.js"></script>

</body>
</html>
