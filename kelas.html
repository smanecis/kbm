<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

    
<title>Data Kelas</title>

<style>
body{
    font-family:Segoe UI;
    background:#f4f4f4;
    margin:0;
}

.header{
    background:#2e7d32;
    color:white;
    padding:20px;
}

.container{
    width:90%;
    max-width:900px;
    margin:auto;
    margin-top:30px;
}

.card{
    background:white;
    padding:20px;
    border-radius:15px;
    box-shadow:0 3px 10px rgba(0,0,0,.1);
}

input{
    width:70%;
    padding:12px;
    border:1px solid #ccc;
    border-radius:10px;
}

button{
    padding:12px 20px;
    border:none;
    border-radius:10px;
    cursor:pointer;
}

.btnTambah{
    background:#2e7d32;
    color:white;
}

.btnHapus{
    background:#d32f2f;
    color:white;
}

table{
    width:100%;
    margin-top:20px;
    border-collapse:collapse;
}

th{
    background:#fbc02d;
    color:white;
    padding:12px;
}

td{
    padding:12px;
    border-bottom:1px solid #ddd;
}
</style>
</head>
<body>

<div class="header">
<h2>🏫 Data Kelas</h2>
</div>

<div class="container">

<div class="card">

<input
type="text"
id="namaKelas"
placeholder="Contoh : X IPA 1">

<button
class="btnTambah"
onclick="tambahKelas()">
Tambah
</button>

<table>

<thead>
<tr>
<th>No</th>
<th>Nama Kelas</th>
<th>Aksi</th>
</tr>
</thead>

<tbody id="dataKelas">

</tbody>

</table>

</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabase.js"></script>
<script src="js/kelas.js"></script>

</body>
</html>
